<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
</head>
<body>

    <h2>User Registration</h2>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <form action="/submit" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Name"
            required
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
