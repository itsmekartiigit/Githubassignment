<!DOCTYPE html>
<html>
<head>
    <title>Todo Page</title>
</head>
<body>

    <h1>Todo Form</h1>

    <form action="/submittodoitem" method="POST">
        <label>Item Name</label><br>
<input type="text" name="itemName" required>

<br><br>

<label>Item ID</label><br>
<input type="text" name="itemId" required>

<br><br>

<label>Item UUID</label><br>
<input type="text" name="itemUUID" required>

<br><br>

<label>Item Hash</label><br>
<input type="text" name="itemHash" required>




        <label>Item Description</label><br>
        <textarea name="itemDescription" required></textarea>

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
